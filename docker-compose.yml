# SearXNG — self-hosted, local, private web search (used from Phase 2).
# Start:  docker compose up -d
# Verify: curl "http://localhost:8080/search?q=test&format=json"
# Requires Docker Desktop (https://docker.com), not the VS Code Docker extension.
version: "3.8"
services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng-data:/etc/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
