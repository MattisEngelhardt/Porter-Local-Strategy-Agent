# SearXNG — self-hosted, local, private web search (used from Phase 2).
# Start:  docker compose up -d
# Verify: curl "http://localhost:8888/search?q=test&format=json"
# Requires Docker Desktop (https://docker.com), not the VS Code Docker extension.
services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      PYTHONPATH: /etc/searxng/python
      PORTER_SEARXNG_RELAX_LOCAL_CA_STRICT: "1"
    volumes:
      - ./searxng-data:/etc/searxng
      - ./searxng-data/certs:/usr/local/share/ca-certificates:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
