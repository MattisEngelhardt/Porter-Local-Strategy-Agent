llm:
  provider: "lmstudio"
  base_url: "http://localhost:1234"    # Change to switch backend
  model: "Porter-12B"
  num_ctx: 65536                        # CRITICAL: Always passed to API (--context-length) — never the 4096 default.
                                        #   64K window: a real high-effort prompt (brain.md + research + sources)
                                        #   measured ~39.3K tokens and overflowed 32K (n_keep > n_ctx 400). Switch
                                        #   profiles with switch-model.ps1 (porter12b | porter12b-128k | porter12b-max | gemma4).
  temperature: 0.2
  thinking_mode: true
  capabilities:
    vision: true
    context_window: 262144
    practical_context: 65536
  embedding_model: "text-embedding-nomic-embed-text-v1.5"
  # KV cache optimization (LM Studio backend): set per-model in LM Studio, NOT read from this file.
  #   GUI: model → Load → Advanced → K/V Cache Quantization Type = Q8_0 (Flash Attention already on).
  #   Q8 ~halves KV-cache VRAM (~57→~29 KB/token), so 64K fits fully on the 8 GB GPU at full speed;
  #   without it 64K ≈ 9.6 GiB and ~1.6 GiB spills to system RAM (still works, just slower).
  #   `lms load` inherits this per-model default. (Ollama equivalent: setx OLLAMA_KV_CACHE_TYPE q8_0)

research:
  searxng_url: "http://localhost:8888"
  max_results_per_query: 8
  max_fetch_per_run: 5
  cache_ttl_hours: 24
  parallel_queries: 3

memory:
  enabled: true
  db_path: "./data/chroma_db"
  collection_name: "strategy_agent_memory"
  top_k_retrieval: 5
  brain_path: "./brain.md"             # Injected into every synthesis call
  max_brain_lines: 300

agent:
  default_language: "auto"             # "auto" | "de" | "en"
  max_clarification_rounds: 3          # user-authorized override of SPEC §5.2 (was 2)
  show_research_plan: true

effort:                                # Phase 3.5 master dial — auto-detected, overridable
  default: "high"                      # used when auto-detect is unsure (never silently shallow)
  critique_min_score: 75               # global pass threshold for the output critic
  worker_concurrency: 2                # workers truly running at once (laptop=2; server: raise)
  levels:
    low:
      research_workers: 1
      max_research_rounds: 1
      max_fetch_per_worker: 3
      max_clarifications: 1
      max_midresearch_questions: 0
      revisions: 0
      critique: false
      thinking: false
    high:
      research_workers: 3
      max_research_rounds: 2
      max_fetch_per_worker: 5
      max_clarifications: 2
      max_midresearch_questions: 1
      revisions: 1
      critique: true
      thinking: true
    ultra:
      research_workers: 5
      max_research_rounds: 3
      max_fetch_per_worker: 8
      max_clarifications: 3
      max_midresearch_questions: 2
      revisions: 1                     # was 2 — one targeted rewrite at the end (initial critique +
                                       #   1 revise + 1 re-critique). Halves the heavy end-stage
                                       #   LLM load; set 0 to critique-and-ship with no rewrite.
      critique: true
      thinking: true

output:
  default_format: "brief"              # "brief" | "deck" | "excel" | agent-decides
  output_dir: "./output"
  include_logo: true
  logo_path: "./assets/neura_logo.png"
  # logo_path_light: "./assets/neura_logo_light.png"  # light logo for the dark cover (optional)
  imagery_dir: "./assets/imagery"      # curated Neura brand imagery (robots/logo) for the cover
  # gtk_runtime_path: "C:/Program Files/GTK3-Runtime Win64/bin"  # optional: WeasyPrint GTK bin
  #   (leave unset to auto-detect standard locations; forced ahead of any libgobject on PATH)
  colors:
    black: "#000000"
    white: "#FFFFFF"
    accent_cyan: "#4DACC7"
    dark_bg: "#111111"
    charcoal: "#2D2D2D"
    light_surface: "#F5F5F5"
    text_dark: "#111111"
    text_light: "#FFFFFF"
    excel_input_cell: "#FFF2CC"        # Yellow — user-editable input cells
    excel_formula_cell: "#DDEEFF"      # Blue — formula output cells
    excel_positive: "#E2EFDA"          # Green — positive/good values
    excel_negative: "#FFDDC1"          # Red-orange — negative/risk values
    excel_header: "#2D2D2D"            # Dark header rows
    artifact_blue: "#1F4E79"           # Premium evidence/accent blue for PDF/PPTX (chart primary series)
    artifact_teal: "#157A6E"           # Decision/action accent for PDF/PPTX (positive series)
    artifact_gold: "#C99700"           # Attention marker for important anchors (highlight series)
    artifact_risk: "#B42318"           # Risk/warning accent, used sparingly
    artifact_mist: "#EEF6F8"           # Quiet evidence-chip background
    # Porter Editorial palette v3.0 (warm canvas + ink + dramatic dark canvas + warm attention)
    paper: "#F4F1EA"                   # warm cream canvas for content pages/slides
    ink: "#1A1813"                     # near-black editorial text
    canvas_dark: "#15140F"             # dramatic dark canvas for cover/divider/recommendation
    coral: "#E4572E"                   # warm attention/risk accent (chart series)
    # Porter Editorial v4.0 — warm extensions + vivid statement fields (additive; v3.0 tokens stay).
    terracotta: "#D2693C"              # warm secondary statement field / earthy card
    ochre: "#E0A126"                   # warm yellow/gold field (brighter than artifact_gold)
    plum: "#5B3A57"                    # deep muted plum field — cool counterweight
    deep_blue: "#1B3A6B"               # saturated editorial blue (table headers / depth)
    sand: "#EDE3D2"                    # warm sand — second light content canvas
    cream_hi: "#FAF6EE"                # bright cream for negative-space editorial-split slides
    knockout_cream: "#F7F1E6"          # warm off-white headline text on saturated/dark fields
    baby_blue: "#7CC6FE"               # vivid: baby blue
    vivid_red: "#E5383B"               # vivid: strong red
    vivid_green: "#2DBE6C"             # vivid: green
    vivid_orange: "#F4791F"            # vivid: orange
    vivid_yellow: "#FFC93C"            # vivid: yellow
    violet: "#7B3FE4"                  # vivid: violet

  style:                               # Porter Editorial design-system v3.0 (typography + depth + charts)
    intensity: "editorial"             # "editorial" (depth + gradients) | "restrained" (flat, board-safe)
    serif_font: "Fraunces"             # PDF display serif (fallback: Georgia)
    grotesk_font: "Space Grotesk"      # PPTX display grotesk (fallback: Aptos)
    body_font: "Inter"                 # body text (fallback: Aptos / Segoe UI)
    mono_font: "Space Mono"            # tracked micro-labels (fallback: Consolas)
    type_theme: "editorial"            # curated font pairing: editorial|kinetic|luxury|modern|brutalist (core/typography.py)
    fonts_dir: "./assets/fonts"        # shipped OFL TTFs embedded into the PDF (@font-face) when present
    charts_enabled: true               # master switch for the data-visualization engine
    max_charts_per_deck: 4
    max_charts_per_brief: 3
    max_diagrams_per_deck: 3           # native Schaubild (diagram) budget per deck
    dedicated_visual_call: false       # laptop default: fold visuals into shape_deck (0 extra LLM calls)
    telemetry_chips: false             # render SOURCES/WORKERS/CONFIDENCE/AS-OF chips on slides (off)

voice:                                 # Phase 5 — local push-to-talk (faster-whisper + pyaudio)
  enabled: true                        # true = Ctrl+Space dictation in the REPL (additive)
  model: "small"                       # faster-whisper size: tiny|base|small|medium|large-v3
  language: "auto"                     # "auto" | "de" | "en"
  hotkey: "ctrl+space"                 # global hotkey to dictate into the prompt
  sample_rate: 16000                   # 16 kHz mono — what Whisper expects
  max_record_seconds: 12               # fixed capture window per press
  compute_type: "int8"                 # CPU-friendly quantization
  # device_index:                      # input device (unset = system default microphone)

logging:
  level: "INFO"
  log_file: "./logs/agent.log"
